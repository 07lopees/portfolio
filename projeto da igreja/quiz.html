<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz de Maria</title>
  <link rel="stylesheet" href="quiz.css">
</head>
<body>

  <div class="quiz-container">

    <div class="timer-container">
      <div id="timer-bar"></div>
    </div>

    <h1>🌹 Quiz de Maria 🌹</h1>

    <p class="subtitulo">
      Teste seus conhecimentos sobre Maria, mãe de Jesus 💙
    </p>

    <div class="pontuacao">
      Pontuação: <span id="score">0</span>/5 ⭐
    </div>

    <div id="quiz">

      <h2 id="question"></h2>

      <div class="answers">
        <button class="answer-btn"></button>
        <button class="answer-btn"></button>
        <button class="answer-btn"></button>
        <button class="answer-btn"></button>
      </div>

      <div id="explanation" class="explanation"></div>

    </div>

    <button id="next-btn">Próxima</button>

  </div>

  <script src="quiz.js"></script>
</body>
</html>
